<!DOCTYPE html>
<html>

<head>

<title>Add Patient</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<!-- Navbar -->

<nav class="navbar navbar-dark bg-dark">
<div class="container-fluid">

<span class="navbar-brand">X-Ray Center Billing</span>

<a href="/" class="btn btn-light">
Search Patient
</a>

</div>
</nav>

<!-- Page Container -->

<div class="container mt-5">

<h3 class="mb-4">Add New Patient</h3>

<div class="row">

<div class="col-md-6">

<label class="form-label">Name</label>
<input id="name" class="form-control">

<label class="form-label mt-3">Age</label>
<input id="age" class="form-control">

<label class="form-label mt-3">Gender</label>
<select id="gender" class="form-control">
<option>Male</option>
<option>Female</option>
</select>

<label class="form-label mt-3">Phone</label>
<input id="phone" class="form-control">

<label class="form-label mt-3">Address</label>
<input id="address" class="form-control">

<label class="form-label mt-3">Referring Doctor</label>
<input id="doctor" class="form-control">

<br><br>

<button onclick="addPatient()" class="btn btn-success">
Save Patient
</button>

</div>

</div>

</div>

<script>

async function addPatient(){

const name=document.getElementById("name").value;
const age=document.getElementById("age").value;
const gender=document.getElementById("gender").value;
const phone=document.getElementById("phone").value;
const address=document.getElementById("address").value;
const doctor=document.getElementById("doctor").value;

const res=await fetch("/patients",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
name:name,
age:age,
gender:gender,
phone:phone,
address:address,
referring_doctor:doctor
})
});

const data=await res.json();

alert("Patient Added Successfully");

window.location="/patient.html?id="+data.id;

}

</script>

</body>

</html>
